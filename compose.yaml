services:
  yubal:
    build: .
    image: yubal:local
    container_name: yubal
    ports:
      - 8000:8000
    environment:
      PUID: 1000
      PGID: 1000
      YUBAL_SCHEDULER_CRON: "0 0 * * *"
      YUBAL_DOWNLOAD_UGC: false
      YUBAL_TZ: Europe/Paris
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
